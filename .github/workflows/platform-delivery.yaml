name: Platform Delivery & Compliance

on:
  push:
    branches: [ main ]

jobs:
  compliance-and-infrastructure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # ... (your existing infrastructure steps)

  container-security-scan:
    name: Build & Scan Controller Image
    runs-on: ubuntu-latest
    needs: compliance-and-infrastructure
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Controller Docker Image
        run: docker build -t sagc-controller:ci-test .

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'sagc-controller:ci-test'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
        env:
          # This tells Trivy CLI to use your local VEX file
          TRIVY_VEX: 'trivy-vex.json'