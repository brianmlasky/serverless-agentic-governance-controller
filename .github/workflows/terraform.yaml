name: Infrastructure Provisioning (Terraform)

on:
  push:
    branches: [ main ]
    paths:
      - '**/*.tf'
      - '.github/workflows/terraform.yaml' # Added this so changes to this workflow file actually trigger the pipeline!
  pull_request:
    branches: [ main ]
    paths:
      - '**/*.tf'

jobs:
  gitops-terraform:
    name: 'Terraform Plan & Apply'
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
      pull-requests: 'write'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: 'Debug Active GCP Identity'
        run: |
          echo "=== Active Account ==="
          gcloud auth list
          echo "=== Core Config ==="
          gcloud config list

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Terraform Format
        run: terraform fmt -check

      # --- POLICY AS CODE GATES ---
      - name: Run TFLint
        run: tflint -f compact

      - name: Run tfsec static analysis
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: false
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # --- INFRASTRUCTURE EXECUTION ---
      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve