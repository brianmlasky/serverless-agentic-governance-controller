static_resources:
  listeners:
  - name: agentic_egress_listener
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 8080
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: egress_llm_traffic
          route_config:
            name: local_route
            virtual_hosts:
            - name: backend
              domains: ["*"]
              routes:
              - match:
                  prefix: "/"
                route:
                  cluster: litellm_gateway_cluster
          http_filters:
          
          # 1. Identity & Budget Authorization (Fail-Closed)
          - name: envoy.filters.http.ext_authz
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
              grpc_service:
                envoy_grpc:
                  cluster_name: opa_authz_cluster
              transport_api_version: V3
              # SEC-01: Explicitly drop traffic if OPA policy engine crashes
              failure_mode_allow: false
              
          # 2. Semantic Payload Inspection & DLP (Fail-Closed)
          - name: envoy.filters.http.ext_proc
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
              grpc_service:
                envoy_grpc:
                  cluster_name: presidio_dlp_cluster
              # SEC-02: Explicitly drop traffic if ML inspection times out
              failure_mode_allow: false
              message_timeout: 3s
              
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
  # The unified LiteLLM/Redis routing plane
  - name: litellm_gateway_cluster
    connect_timeout: 1s
    type: STRICT_DNS
    load_assignment:
      cluster_name: litellm_gateway_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: litellm-gateway.agentic.svc.cluster.local
                port_value: 4000

  # The Open Policy Agent cluster for identity binding
  - name: opa_authz_cluster
    connect_timeout: 0.5s
    type: STRICT_DNS
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
    load_assignment:
      cluster_name: opa_authz_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: 127.0.0.1
                port_value: 9191

  # The local ML container for PII/Injection detection
  - name: presidio_dlp_cluster
    connect_timeout: 1s
    type: STRICT_DNS
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
    load_assignment:
      cluster_name: presidio_dlp_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: 127.0.0.1
                port_value: 50051
