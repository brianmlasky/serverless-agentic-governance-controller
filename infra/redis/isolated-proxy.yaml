apiVersion: v1
kind: Pod
metadata:
  name: isolated-proxy
  namespace: agentic
spec:
  containers:
  - name: litellm
    image: ghcr.io/berriai/litellm:main-latest
    args: ["--config", "/app/config.yaml", "--port", "4000"]
    env:
    - name: LITELLM_MASTER_KEY
      value: "sk-1234"
    volumeMounts:
    - name: config-volume
      mountPath: /app/config.yaml
      subPath: config.yaml
  volumes:
  - name: config-volume
    configMap:
      name: isolated-config
