apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: agentic
  labels:
    app: api-gateway
    version: v2.0.5
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        version: v2.0.5
    spec:
      containers:
      - name: api-gateway
        image: us-central1-docker.pkg.dev/alert-hall-466720-c0/dev-repo/api-gateway:v2.0.5@sha256:6b0cb10d1ec6ae46d98a9e9ae0b8588bde518703db711ba232201c8a4925c192
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: LITELLM_BASE_URL
          value: "http://litellm-gateway.litellm.svc.cluster.local:80"
        - name: LITELLM_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-master-key
              key: master-key
        - name: IAP_AUDIENCE
          value: "/projects/390958881559/global/backendServices/482921328315087641"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
