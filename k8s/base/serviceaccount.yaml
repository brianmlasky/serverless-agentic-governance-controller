apiVersion: v1
kind: ServiceAccount
metadata:
  name: sagc-agent-sa
  namespace: agentic
  annotations:
    # This is the critical WIF bridge. It maps the K8s identity to the GCP IAM identity.
    iam.gke.io/gcp-service-account: sagc-controller@alert-hall-466720-c0.iam.gserviceaccount.com
spec:
  template:
    spec:
      containers: []
  jobTemplate:
    spec:
      template:
        spec:
          containers: []
  containers: []
