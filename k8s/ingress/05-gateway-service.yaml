apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: litellm
  labels:
    app: api-gateway
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: serverless-agentic-platform
  annotations:
    cloud.google.com/backend-config: '{"default": "api-gateway-backend"}'
    cloud.google.com/neg: '{"ingress": true}'
    kube-linter.io/ignore-all: "true"
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
  template:
    spec:
      containers: []
  jobTemplate:
    spec:
      template:
        spec:
          containers: []
  containers: []
