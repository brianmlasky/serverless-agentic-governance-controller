apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway-ingress
  namespace: litellm
  labels:
    app: api-gateway
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: serverless-agentic-platform
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "api-gateway-ip"
    networking.gke.io/managed-certificates: "api-gateway-cert,api-gateway-cert-sap"
    networking.gke.io/v1beta1.FrontendConfig: "api-gateway-frontend"
spec:
  defaultBackend:
    service:
      name: api-gateway-service
      port:
        number: 8080
  rules:
    - host: api.brian-lasky.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 8080
    - host: api.serverless-agentic-platform.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 8080
