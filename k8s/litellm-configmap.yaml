apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    model_list:

      - model_name: bedrock-llama4-scout
        litellm_params:
          model: bedrock/us.meta.llama4-scout-17b-instruct-v1:0
          aws_region_name: us-east-1

      - model_name: bedrock-llama4-maverick
        litellm_params:
          model: bedrock/us.meta.llama4-maverick-17b-instruct-v1:0
          aws_region_name: us-east-1

      - model_name: bedrock-claude-haiku
        litellm_params:
          model: bedrock/us.anthropic.claude-haiku-4-5-20251001-v1:0
          aws_region_name: us-east-1

      - model_name: bedrock-claude-sonnet
        litellm_params:
          model: bedrock/us.anthropic.claude-sonnet-4-5-20250929-v1:0
          aws_region_name: us-east-1

      - model_name: gemini-2-5-pro
        litellm_params:
          model: vertex_ai/gemini-2.5-pro
          vertex_project: alert-hall-466720-c0
          vertex_location: us-central1
          max_tokens: 8192

    litellm_settings:
      drop_params: true

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
