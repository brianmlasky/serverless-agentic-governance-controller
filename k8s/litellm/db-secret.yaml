apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-gateway-db-credentials-v2
  namespace: litellm
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: api-gateway-db-credentials-v2
    creationPolicy: Owner
  data:
  - secretKey: DATABASE_URL
    remoteRef:
      key: DATABASE_URL
