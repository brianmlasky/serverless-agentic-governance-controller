apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: K8sFiscalLimits
spec:
  crd:
    spec:
      names:
        kind: K8sFiscalLimits
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |-
        package k8s.fiscal.guardrails

        deny[msg] if {
            input.request.kind.kind == "Pod"
            container := input.request.object.spec.containers[_]
            not container.resources.limits
            msg := sprintf("FISCAL VIOLATION: Container '%v' lacks resource limits.", [container.name])
        }
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: check-cost-center
  annotations:
    policies.kyverno.io/title: Require Cost Center Label
    policies.kyverno.io/description: >
      FinSecOps: Every pod must declare a cost-center label for billing attribution. Audit mode until all workloads confirmed compliant.

spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-cost-center-label
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "FinSecOps: Every pod must have a 'cost-center' label."
        pattern:
          metadata:
            labels:
              cost-center: "?*"
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sFiscalLimits
metadata:
  name: fiscal-limit-enforcer
spec:
  # This matches the 'ConstraintTemplate' we created
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    # We apply this to the 'agentic' namespace where our 
    # serverless-agentic-governance-controller pods will live.
    namespaces:
      - "agentic"
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - templates/fiscal-limit-template.yaml
  - fiscal-limit-constraint.yaml
