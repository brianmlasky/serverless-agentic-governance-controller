apiVersion: apps/v1
kind: Deployment
metadata:
  name: sagc-controller
  namespace: agentic
  labels:
    app: sagc-controller
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sagc-controller
  template:
    metadata:
      labels:
        app: sagc-controller
    spec:
      containers:
        - name: controller
          # In a real CI/CD pipeline, this would be your Google Artifact Registry image path
          image: sagc-controller:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            # Dynamically route to the local LiteLLM service
            - name: LITELLM_PROXY_URL
              value: "http://litellm-service.agentic.svc.cluster.local:4000"
          # ----------------------------------------------------
          # CRITICAL: FISCAL GUARDRAIL COMPLIANCE
          # This block ensures the pod passes your OPA Gatekeeper policy
          # ----------------------------------------------------
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # Standard liveness probe pointing to the healthz endpoint we wrote in Python
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - sagc-controller
                topologyKey: kubernetes.io/hostname
  jobTemplate:
    spec:
      template:
        spec:
          containers: []
---
