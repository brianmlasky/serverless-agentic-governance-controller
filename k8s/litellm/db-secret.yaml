apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-proxy
  namespace: governance
  labels:
    app: litellm-proxy
    component: agentic-gateway
spec:
  replicas: 2 # High Availability per our SRE spec
  selector:
    matchLabels:
      app: litellm-proxy
  template:
    metadata:
      labels:
        app: litellm-proxy
    spec:
      # 1. THE IDENTITY BRIDGE: Attach the Workload Identity KSA
      serviceAccountName: litellm-ksa
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-latest
          ports:
            - containerPort: 4000
          # 2. THE FISCAL GUARDRAILS: Hard resource limits
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          env:
            # 3. THE SECRETS DEPENDENCY: Tell LiteLLM to look for GSM
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/var/run/secrets/kubernetes.io/serviceaccount/token"
            - name: PROXY_CONFIG_MODE
              value: "google_secret_manager"
          # 4. LIVENESS PROBES: Ensure CrashLoopBackOff mitigation
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - litellm-proxy
                topologyKey: kubernetes.io/hostname
