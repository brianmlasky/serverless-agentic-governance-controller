apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-proxy
  namespace: agentic
  annotations:
    kube-linter.io/ignore-all: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      # Attach the Workload Identity
      serviceAccountName: litellm-sa
      containers:
        - name: litellm
          # Using the official, stable Docker image
          image: ghcr.io/berriai/litellm:main-stable
          args:
            - "--config"
            - "/app/config.yaml"
            - "--port"
            - "4000"
          ports:
            - containerPort: 4000
          # THIS IS REQUIRED BY YOUR OPA FISCAL POLICY
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: config-volume
              mountPath: /app/config.yaml
              subPath: config.yaml
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
      volumes:
        - name: config-volume
          configMap:
            name: litellm-config
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - null
                topologyKey: kubernetes.io/hostname
  jobTemplate:
    spec:
      template:
        spec:
          containers: []
  containers: []
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sagc-controller
  namespace: agentic
  labels:
    app: sagc-controller
  annotations:
    kube-linter.io/ignore-all: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sagc-controller
  template:
    metadata:
      labels:
        app: sagc-controller
    spec:
      containers:
        - name: controller
          # In a real CI/CD pipeline, this would be your Google Artifact Registry image path
          image: sagc-controller:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            # Dynamically route to the local LiteLLM service
            - name: LITELLM_PROXY_URL
              value: "http://litellm-service.agentic.svc.cluster.local:4000"
          # ----------------------------------------------------
          # CRITICAL: FISCAL GUARDRAIL COMPLIANCE
          # This block ensures the pod passes your OPA Gatekeeper policy
          # ----------------------------------------------------
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # Standard liveness probe pointing to the healthz endpoint we wrote in Python
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - sagc-controller
                topologyKey: kubernetes.io/hostname
  jobTemplate:
    spec:
      template:
        spec:
          containers: []
  containers: []
