metadata:
  name: sagc-redis-chaos-monkey
  namespace: litellm
spec:
  schedule: "0 2 * * 0"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: redis-chaos
              image: redis:7-alpine
              command:
                - /bin/sh
                - -c
                - |
                  echo "[CHAOS INITIATED] Deleting global primary lock to simulate region failure..."
                  redis-cli -h redis-master.litellm.svc.cluster.local DEL global-primary-lock
                  echo "[CHAOS COMPLETE] Lock destroyed. Telemetry should now show 100% egress failure."
          restartPolicy: OnFailure
