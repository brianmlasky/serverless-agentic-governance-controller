kind: Service
metadata:
  name: litellm-service
  namespace: governance
spec:
  # ClusterIP ensures this proxy is ONLY accessible from inside the GKE VPC
  type: ClusterIP
  selector:
    app: litellm-proxy
  ports:
    - protocol: TCP
      port: 4000
      targetPort: 4000
