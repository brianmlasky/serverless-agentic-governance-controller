apiVersion: apps/v1
kind: Deployment
metadata:
  name: governance-controller
  namespace: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: governance-controller
  template:
    metadata:
      labels:
        app: governance-controller
        cost-center: agentic-platform.dev
      annotations:
        iam.gke.io/gcp-service-account: litellm-sa@alert-hall-466720-c0.iam.gserviceaccount.com
        iam.gcp.io/gcp-service-account: litellm-sa@alert-hall-466720-c0.iam.gserviceaccount.com
    spec:
      serviceAccountName: api-gateway-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: controller
          image: us-central1-docker.pkg.dev/alert-hall-466720-c0/agentic-platform/governance-controller:v9
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          env:
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: governance-secrets
                  key: SLACK_WEBHOOK_URL
          command: ["python3", "-u", "alert_proxy.py"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
  jobTemplate:
    spec:
      template:
        spec:
          containers: []
  containers: []
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway-sa
spec:
  template:
    spec:
      containers: []
  jobTemplate:
    spec:
      template:
        spec:
          containers: []
  containers: []
