apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: governance-pod-killer
  namespace: litellm
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "patch", "update"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: governance-binding
  namespace: litellm
subjects:
- kind: ServiceAccount
  name: api-gateway-sa # The SA we mapped in your controller
roleRef:
  kind: Role
  name: governance-pod-killer
  apiGroup: rbac.authorization.k8s.io
