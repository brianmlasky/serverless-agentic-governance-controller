# Policy 1: Default deny-all egress for the litellm namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: litellm
spec:
  podSelector: {}
  policyTypes:
    - Egress
  template:
    spec:
      containers: []
  jobTemplate:
    spec:
      template:
        spec:
          containers: []
  containers: []
---
# Policy 2: Allow DNS egress for all pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: litellm
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
  template:
    spec:
      containers: []
  jobTemplate:
    spec:
      template:
        spec:
          containers: []
  containers: []
---
# Policy 3: Allow Cloud SQL proxy egress only for authorized pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cloudsql-egress
  namespace: litellm
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - api-gateway
          - litellm-gateway
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 3307
          protocol: TCP
  template:
    spec:
      containers: []
  jobTemplate:
    spec:
      template:
        spec:
          containers: []
  containers: []
---
# Policy 4: Allow HTTPS egress for the Gateway to reach external LLM APIs
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-llm-provider-egress
  namespace: litellm
spec:
  podSelector:
    matchLabels:
      app: litellm-gateway
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP
  template:
    spec:
      containers: []
  jobTemplate:
    spec:
      template:
        spec:
          containers: []
  containers: []
