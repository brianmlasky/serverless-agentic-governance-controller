apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: enforce-opa-sidecar-routing
  namespace: sagc
spec:
  podSelector:
    matchLabels:
      app: llm-gateway
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: controller
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: controller\n