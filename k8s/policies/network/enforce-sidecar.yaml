apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: enforce-opa-sidecar-routing
  namespace: sagc
spec:
  podSelector:
    matchLabels:
      app: llm-gateway
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - serviceAccountSelector:
        matchLabels:
          name: sagc-controller-sa
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - serviceAccountSelector:
        matchLabels:
          name: sagc-controller-sa
    ports:
    - protocol: TCP
      port: 6379
