apiVersion: v1
kind: ServiceAccount
metadata:
  name: sagc-controller-sa
  namespace: sagc
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llm-gateway-sa
  namespace: sagc
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sagc-strict-isolation
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"] 
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sagc-isolation-binding
  namespace: sagc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sagc-strict-isolation
subjects:
- kind: ServiceAccount
  name: sagc-controller-sa
  namespace: sagc
- kind: ServiceAccount
  name: llm-gateway-sa
  namespace: sagc
