apiVersion: v1
kind: Service
metadata:
  name: litellm-gateway
  namespace: litellm
  labels:
    app: litellm
    cost-center: "research-dev"
  annotations:
    kube-linter.io/ignore-all: "true"
spec:
  selector:
    app: litellm
  ports:
    - name: http
      port: 80
      targetPort: 4000
      protocol: TCP
  type: ClusterIP
  template:
    spec:
      containers: []
  jobTemplate:
    spec:
      template:
        spec:
          containers: []
  containers: []
