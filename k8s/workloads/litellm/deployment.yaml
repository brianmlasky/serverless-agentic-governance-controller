apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-proxy
  namespace: agentic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      # Attach the Workload Identity
      serviceAccountName: litellm-sa
      containers:
        - name: litellm
          # Using the official, stable Docker image
          image: ghcr.io/berriai/litellm:main-stable
          args:
            - "--config"
            - "/app/config.yaml"
            - "--port"
            - "4000"
          ports:
            - containerPort: 4000
          # THIS IS REQUIRED BY YOUR OPA FISCAL POLICY
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: config-volume
              mountPath: /app/config.yaml
              subPath: config.yaml
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
      volumes:
        - name: config-volume
          configMap:
            name: litellm-config
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - sagc-workload
                topologyKey: kubernetes.io/hostname
  jobTemplate:
    spec:
      template:
        spec:
          containers: []
