---
# GKE Workload Identity is configured via IAM binding, not pod annotations.
# The eks.amazonaws.com/role-arn annotation is an AWS IRSA construct and has
# no effect on GKE Autopilot. Removed to avoid misleading operators.
#
# To bind GCP IAM → Workload Identity for Bedrock access via AWS:
#   The pod uses the AWS credentials injected by LiteLLM config (env vars /
#   Secret Manager), not a pod-level IAM annotation.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: litellm-sa
  namespace: litellm
  labels:
    app.kubernetes.io/part-of: serverless-agentic-platform
    app.kubernetes.io/component: service-account
    cost-center: research-dev
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: litellm-sa
  namespace: agentic
  labels:
    app.kubernetes.io/part-of: serverless-agentic-platform
    app.kubernetes.io/component: service-account
    cost-center: agent-logic
