apiVersion: apps/v1
kind: Deployment
metadata:
  name: sagc-controller
  namespace: agentic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sagc-controller
  template:
    metadata:
      labels:
        app: sagc-controller
    spec:
      serviceAccountName: sagc-agent-sa # Binds the pod to the WIF identity
      containers:
        - name: controller
          # This will be dynamically replaced by Kustomize/CI during deployment
          image: GCR_PATH_REDACTED/sagc-controller:v1.0.0
          ports:
            - containerPort: 8080
          resources:
            # Fiscal SecOps: Strict resource limits to prevent runaway compute costs
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
  jobTemplate:
    spec:
      template:
        spec:
          containers: []
  containers: []
