apiVersion: v1
kind: ServiceAccount
metadata:
  name: litellm-sa
  namespace: agentic
  annotations:
    # This is the Workload Identity binding. 
    # LiteLLM inherits this identity to securely talk to AWS Bedrock without static keys.
    iam.gke.io/gcp-service-account: "sagc-workload@alert-hall-466720-c0.iam.gserviceaccount.com"
spec:
  template:
    spec:
      containers: []
  jobTemplate:
    spec:
      template:
        spec:
          containers: []
  containers: []
